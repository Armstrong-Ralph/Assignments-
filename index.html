<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Simple Website - Home</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f9;
        }
        header {
            background-color: #2c3e50;
            color: white;
            padding: 20px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .img {
            width: 100px
            border-radius: 10px
            float: left;
        }
        nav {
            background-color: #34495e;
            padding: 10px;
            text-align: center;
        }
        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
        }
        nav a:hover {
            color: #e74c3c;
        }
        main {
            padding: 20px;
            background-color: white;
            margin: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            color: #333;
        }
        h1 {
            color: #000000
            font-weight: bold
            font-size: 10px;
        }
        p {
            line-height: 1.6;
            color: #555;
        }
        footer {
            text-align: center;
            padding: 10px;
            background-color: #2c3e50;
            color: white;
            position: fixed;
            bottom: 0;
            width: 100%;
        }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <img src="mylogo.jpeg" alt="My Logo">
    </div>
    <h1>@armstrongraph loves making websites.</h1>
    <div style="width: 100px;"></div> <!-- Spacer for centering header text -->
</header>

<nav>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
    <a href="services.html">Services</a>
    <a href="contact.html">Contact</a>
</nav>

<main>
    <h1>Home Page</h1>
    <p>This is the main content area of the home page.</p>
    <p style="color: #27ae60;">This text is green to demonstrate inline color styling!</p>
</main>

<footer>
    &copy; 2026 My Simple Website
</footer>

</body>
</html>
